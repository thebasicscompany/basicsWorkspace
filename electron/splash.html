<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #F5F7FA;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      border-radius: 12px;
      overflow: hidden;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      border-radius: 14px;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      color: #1A1D26;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid #E5E7EB;
      border-top-color: #059669;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <img class="logo" src="../public/logo.png" alt="Basics" />
  <div class="title">Basics</div>
  <div class="spinner"></div>
</body>
</html>
