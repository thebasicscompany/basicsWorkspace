<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #F9F7F4;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      border-radius: 12px;
      overflow: hidden;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      color: #18181B;
      margin-bottom: 24px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #E4E2DE;
      border-top-color: #2D8653;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="14" fill="#2D8653"/>
    <text x="32" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="white">B</text>
  </svg>
  <div class="title">Basics</div>
  <div class="spinner"></div>
</body>
</html>
