<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recording</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: transparent;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 5px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.03);
      -webkit-app-region: drag;
      cursor: grab;
    }
    .dot-wrap {
      position: relative;
      width: 8px;
      height: 8px;
      flex-shrink: 0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #F43F5E;
    }
    .dot-ping {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #FB7185;
      opacity: 0.75;
      animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      75%, 100% { transform: scale(2.2); opacity: 0; }
    }
    .timer {
      font-size: 12px;
      font-weight: 600;
      color: #1A1D26;
      font-variant-numeric: tabular-nums;
      min-width: 28px;
    }
    .events {
      font-size: 11px;
      color: #9CA3AF;
      white-space: nowrap;
    }
    .stop-btn {
      -webkit-app-region: no-drag;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      background: #F43F5E;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .stop-btn:hover { background: #E11D48; }
    .stop-icon {
      width: 8px;
      height: 8px;
      background: #FFFFFF;
      border-radius: 1.5px;
    }
  </style>
</head>
<body>
  <div class="pill">
    <div class="dot-wrap">
      <div class="dot-ping"></div>
      <div class="dot"></div>
    </div>
    <span class="timer" id="timer">0:00</span>
    <span class="events" id="events">0 events</span>
    <button class="stop-btn" id="stop">
      <div class="stop-icon"></div>
      Stop
    </button>
  </div>

  <script>
    const timerEl = document.getElementById('timer');
    const eventsEl = document.getElementById('events');
    const stopBtn = document.getElementById('stop');

    let startTime = Date.now();
    let eventCount = 0;

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return m + ':' + String(sec).padStart(2, '0');
    }

    setInterval(() => {
      timerEl.textContent = formatTime(Date.now() - startTime);
    }, 1000);

    window.overlayAPI.onEvent(() => {
      eventCount++;
      eventsEl.textContent = eventCount + (eventCount === 1 ? ' event' : ' events');
    });

    window.overlayAPI.onInit((data) => {
      startTime = data.startedAt || Date.now();
      eventCount = data.eventCount || 0;
      eventsEl.textContent = eventCount + (eventCount === 1 ? ' event' : ' events');
    });

    stopBtn.addEventListener('click', () => {
      window.overlayAPI.stop();
    });
  </script>
</body>
</html>
